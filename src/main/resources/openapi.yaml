openapi: 3.1.0
info:
  title: API
  version: 1.0.0
paths:
  /clients:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
                social_links:
                  type: array
                  items:
                    type: string
              required: [first_name, last_name, email]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
          description: "returns created client"

  /clients/{id}/documents:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
              required: [title, content]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
          description: "returns a just created document"

  /search:
    get:
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "returns documents"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
components:
  schemas:
    Client:
      type: object
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        description:
          type: string
        social_links:
          type: array
          items:
            type: string

    Document:
      type: object
      properties:
        id:
          type: string
        client_id:
          type: string
        title:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time