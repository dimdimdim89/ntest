openapi: 3.1.0
info:
  title: API
  version: 1.0.0
paths:
  /clients:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
                social_links:
                  type: array
                  items:
                    type: string
              required: [first_name, last_name, email]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
          description: "returns created client"
        "400":
          description: "invalid client payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clients/{id}/documents:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
              required: [title, content]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
          description: "returns created document"
        "400":
          description: "invalid document payload"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "client not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /search:
    get:
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Optional filter for narrowing search to a single entity type.
          schema:
            type: string
            enum: [client, document]
      responses:
        "200":
          description: "returns matched clients and documents"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "400":
          description: "invalid search request"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Client:
      type: object
      required: [first_name, last_name, email]
      properties:
        id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        description:
          type: string
        social_links:
          type: array
          items:
            type: string

    Document:
      type: object
      required: [title, content]
      properties:
        id:
          type: string
        client_id:
          type: string
        title:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time

    SearchResults:
      type: object
      required: [query, clients, documents]
      properties:
        query:
          type: string
        clients:
          type: array
          items:
            $ref: "#/components/schemas/Client"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
